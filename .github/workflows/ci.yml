name: CI/CD Pipeline

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

env:
  JAVA_VERSION: '25'
  JAVA_DISTRIBUTION: 'temurin'
  MAVEN_OPTS: -Xmx2048m

jobs:
  # Runs first and gates the expensive jobs: a malformed workflow (bad if:, broken context ref,
  # shellcheck finding in a run block) is caught in seconds, before the Java build spins up.
  workflow-lint:
    name: Lint GitHub Actions workflows
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2
        with:
          egress-policy: block
          disable-sudo: true
          allowed-endpoints: >
            github.com:443
            api.github.com:443
            objects.githubusercontent.com:443
            release-assets.githubusercontent.com:443

      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Run actionlint
        # Download the pinned release binary and verify its checksum before running — same
        # verified-artifact approach as the Claude CLI install, no build step or piped installer.
        env:
          ACTIONLINT_VERSION: "1.7.12"
          ACTIONLINT_SHA256: "8aca8db96f1b94770f1b0d72b6dddcb1ebb8123cb3712530b08cc387b349a3d8"
        run: |
          set -euo pipefail
          tarball="actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz"
          curl --proto '=https' --tlsv1.2 -fsSLO "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/${tarball}"
          echo "${ACTIONLINT_SHA256}  ${tarball}" | sha256sum -c -
          tar -xzf "$tarball" actionlint
          ./actionlint -color

  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    needs: workflow-lint
    permissions:
      contents: read
      checks: write
      pull-requests: write

    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2
        # The wildcard blob/s3 endpoints are required by the Actions cache/artifacts and Sonar
        # and cannot be pinned to fixed hosts because the storage accounts rotate; they widen
        # egress but everything else (arbitrary hosts, the known-bad list) stays blocked.
        with:
          egress-policy: block
          disable-sudo: true
          allowed-endpoints: >
            github.com:443
            api.github.com:443
            objects.githubusercontent.com:443
            api.adoptium.net:443
            repo.maven.apache.org:443
            keyserver.ubuntu.com:443
            binaries.sonarsource.com:443
            sonarcloud.io:443
            api.sonarcloud.io:443
            scanner.sonarcloud.io:443
            *.actions.githubusercontent.com:443
            *.blob.core.windows.net:443
            *.s3.eu-central-1.amazonaws.com:443

      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0  # Shallow clones should be disabled for better SonarQube analysis

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}

      - name: Cache Maven packages
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        id: maven-cache
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Cache SonarQube packages
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Debug cache status
        run: |
          echo "Cache hit: ${{ steps.maven-cache.outputs.cache-hit }}"
          echo "Maven repository size: $(du -sh ~/.m2/repository 2>/dev/null || echo 'not found')"

      - name: Build project
        run: mvn clean compile -Dspotless.check.skip=true

      - name: Run tests with coverage
        run: mvn install -Dspotless.check.skip=true

      - name: Generate JaCoCo report
        run: mvn jacoco:report

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: test-results
          path: |
            **/target/surefire-reports/*.xml
            **/target/failsafe-reports/*.xml
          retention-days: 30

      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-reports
          path: |
            **/target/site/jacoco/
            **/target/jacoco.exec
          retention-days: 30

      - name: Publish test report
        if: always()
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2 # v3.0
        with:
          name: Maven Tests
          path: '**/target/surefire-reports/*.xml'
          reporter: java-junit
          fail-on-error: true

      - name: SonarQube Scan
        if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # qualitygate.wait polls SonarCloud after submitting and fails the step if the gate is red,
        # so a regression breaks the build instead of only showing on the PR decoration.
        run: mvn sonar:sonar -Dsonar.qualitygate.wait=true

  code-quality:
    name: Code Quality Checks
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2
        # The wildcard blob/s3 endpoints are required by the Actions cache/artifacts and Sonar
        # and cannot be pinned to fixed hosts because the storage accounts rotate; they widen
        # egress but everything else (arbitrary hosts, the known-bad list) stays blocked.
        with:
          egress-policy: block
          disable-sudo: true
          allowed-endpoints: >
            github.com:443
            api.github.com:443
            objects.githubusercontent.com:443
            api.adoptium.net:443
            repo.maven.apache.org:443
            keyserver.ubuntu.com:443
            binaries.sonarsource.com:443
            sonarcloud.io:443
            api.sonarcloud.io:443
            scanner.sonarcloud.io:443
            *.actions.githubusercontent.com:443
            *.blob.core.windows.net:443
            *.s3.eu-central-1.amazonaws.com:443

      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}

      - name: Cache Maven packages
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Download coverage reports
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: coverage-reports
          path: target/

      - name: Generate coverage badge
        if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
        run: |
          echo "Coverage badge generation would go here"
          # You can use tools like jacoco-badge-generator or shields.io

  dependency-check:
    name: Dependency Security Check
    runs-on: ubuntu-latest
    needs: workflow-lint

    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2
        # The wildcard blob/s3 endpoints are required by the Actions cache/artifacts and Sonar
        # and cannot be pinned to fixed hosts because the storage accounts rotate; they widen
        # egress but everything else (arbitrary hosts, the known-bad list) stays blocked.
        with:
          egress-policy: block
          disable-sudo: true
          allowed-endpoints: >
            github.com:443
            api.github.com:443
            objects.githubusercontent.com:443
            api.adoptium.net:443
            repo.maven.apache.org:443
            keyserver.ubuntu.com:443
            binaries.sonarsource.com:443
            sonarcloud.io:443
            api.sonarcloud.io:443
            scanner.sonarcloud.io:443
            *.actions.githubusercontent.com:443
            *.blob.core.windows.net:443
            *.s3.eu-central-1.amazonaws.com:443

      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}

      - name: Cache Maven packages
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Run dependency check
        run: mvn dependency:tree

  # Automatic Claude review of a PR's changes. Gated on build-and-test: a red build skips the
  # review entirely rather than spending a model call on a diff that does not compile. Skips forks
  # and Dependabot, which do not receive the secret on `pull_request` (and Dependabot PRs are
  # already reviewed by the auto-merge workflow). Only the latest push per PR is reviewed: a newer
  # push cancels the in-flight review of the now-stale diff.
  claude-review:
    name: Review PR changes
    runs-on: ubuntu-latest
    needs: build-and-test
    if: >
      github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.actor != 'dependabot[bot]'
    concurrency:
      group: claude-review-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write

    steps:
      # `audit`, not `block` like the jobs above: the Claude action's egress set (API plus
      # telemetry) is not fixed, and a missing endpoint fails as an opaque hang. This preserves the
      # policy the job had in claude.yml.
      - name: Harden the runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2
        with:
          egress-policy: audit
          disable-sudo: true

      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      # track_progress makes the action post/update a PR comment on pull_request events;
      # without it the agent has no comment tool and the review completes invisibly.
      - name: Review the pull request
        uses: anthropics/claude-code-action@af0559ee4f514d1ef21826982bed13f7edc3c35e # v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          track_progress: true
          claude_args: "--model claude-sonnet-5"
          prompt: |
            Review the pull request diff. Focus on correctness bugs, security issues, and
            compliance with the Architecture Decision Records in docs/design-decisions.md.
            Leave inline review comments on specific lines where warranted, and a short summary.
            If you have reviewed this PR before (look for previous claude[bot] comments), check
            whether each earlier finding was addressed by the new commits and say so explicitly,
            reviewing only the changed code in depth rather than restating the whole diff.
            Do not approve or merge; this review is advisory.

      - name: Check for vulnerable dependencies
        run: mvn versions:display-dependency-updates
