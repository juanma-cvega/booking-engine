name: Dependabot Auto-Merge

# Runs after the "CI/CD Pipeline" workflow finishes on a Dependabot pull request.
# Dependabot PRs run with a read-only token and are denied repository secrets on the
# `pull_request` event, so we cannot analyse or merge from there. `workflow_run` fires in
# the trusted context of the base repo (full secrets + a write-capable GITHUB_TOKEN) once
# CI has completed, which also lets us gate on the CI status checks having passed.
on:
  workflow_run:
    workflows: ["CI/CD Pipeline"]
    types:
      - completed

# Least privilege: the workflow token is read-only at this scope; each job below widens only
# what it needs. The merge job does its write through a separate GitHub App token, not this one.
permissions:
  contents: read

# Serialize entire runs: while one PR is being analysed and merged, others wait. Once the
# winner merges, the losers are behind master and the guard below skips them until Dependabot
# rebases and re-triggers them — avoiding redundant analysis and untested merges.
concurrency:
  group: dependabot-auto-merge
  cancel-in-progress: false

jobs:
  # Gate 1: only proceed when CI succeeded on a Dependabot pull request.
  guard:
    name: Verify CI passed on a Dependabot PR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    # Cheap pre-filters only: run on a successful CI completion for a same-repo dependabot/*
    # branch. The trust decision — that the PR is genuinely authored by Dependabot — is NOT made
    # here: actor/triggering_actor identify who triggered the run, not who authored the PR, and
    # are forgeable. Authorship is verified against the API in the step below.
    if: >
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_repository.full_name == github.repository &&
      startsWith(github.event.workflow_run.head_branch, 'dependabot/')
    outputs:
      pr_number: ${{ steps.pr.outputs.number }}
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2
        with:
          egress-policy: block
          disable-sudo: true
          allowed-endpoints: >
            github.com:443
            api.github.com:443

      - name: Resolve the pull request for this branch
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
        run: |
          # Authorship gate: resolve an OPEN PR on this branch whose author is the Dependabot
          # app, read from the API rather than the (forgeable) event actor. If none matches,
          # nothing downstream runs.
          pr=$(gh pr list \
            --repo "${{ github.repository }}" \
            --head "$HEAD_BRANCH" \
            --state open \
            --author "app/dependabot" \
            --json number \
            --jq '.[0].number')
          if [ -z "$pr" ] || [ "$pr" = "null" ]; then
            echo "No open Dependabot PR found for branch $HEAD_BRANCH; nothing to do."
            echo "number=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Skip a PR that is behind master: it will be rebased and re-triggered, so analysing
          # or merging it now is wasted work and would merge a combination CI never tested.
          head=$(gh pr view "$pr" --repo "${{ github.repository }}" \
            --json headRefOid --jq '.headRefOid')
          behind=$(gh api "repos/${{ github.repository }}/compare/master...$head" --jq '.behind_by')
          if [ "${behind:-0}" -gt 0 ]; then
            echo "PR #$pr is $behind commit(s) behind master; skipping until it is rebased."
            echo "number=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Resolved PR #$pr (up to date with master)"
          echo "number=$pr" >> "$GITHUB_OUTPUT"

  # Gate 2: let Claude Code review the change for deprecations / breaking changes.
  analyse:
    name: Analyse PR with Claude Code
    runs-on: ubuntu-latest
    needs: guard
    permissions:
      contents: read
      pull-requests: write
    if: needs.guard.outputs.pr_number != ''
    outputs:
      verdict: ${{ steps.review.outputs.verdict }}
      touches_workflows: ${{ steps.review.outputs.touches_workflows }}
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2
        with:
          egress-policy: block
          disable-sudo: true
          allowed-endpoints: >
            github.com:443
            api.github.com:443
            downloads.claude.ai:443
            api.anthropic.com:443

      # No ref: on workflow_run, checkout defaults to the default branch, never the PR head, so
      # this privileged job never runs untrusted PR code. Do not add a ref.
      - name: Checkout the default branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Claude Code CLI
        # Download the pinned native binary from the signed release bucket and verify it before
        # use: GPG-verify the manifest (transitively signing every checksum), then check the
        # binary's SHA256 against it. No npm, so no package lifecycle scripts run — an immutable,
        # verified artifact rather than an opaque install script. The pin is a static version;
        # bumping it is a one-line change. This step has no secrets in scope regardless.
        env:
          CLAUDE_VERSION: "2.1.207"
          # Anthropic Claude Code release signing key fingerprint; the manifest signature must
          # trace back to it. Public value, not a secret.
          CLAUDE_SIGNING_KEY: "31DDDE24DDFAB679F42D7BD2BAA929FF1A7ECACE" # gitleaks:allow
        run: |
          set -euo pipefail
          base="https://downloads.claude.ai/claude-code-releases/${CLAUDE_VERSION}"
          # -L follows redirects; --proto '=https' --tlsv1.2 refuses to follow one down to HTTP.
          dl() { curl --proto '=https' --tlsv1.2 -fsSL "$@"; }

          dl https://downloads.claude.ai/keys/claude-code.asc | gpg --import
          gpg --fingerprint security@anthropic.com | tr -d ' ' | grep -q "$CLAUDE_SIGNING_KEY"

          dl -O "$base/manifest.json"
          dl -O "$base/manifest.json.sig"
          gpg --verify manifest.json.sig manifest.json

          expected=$(jq -r '.platforms["linux-x64"].checksum' manifest.json)
          dl -o claude "$base/linux-x64/claude"
          echo "${expected}  claude" | sha256sum -c -

          install -m 0755 claude "$HOME/.local/bin/claude"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Analyse the dependency update
        id: review
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ needs.guard.outputs.pr_number }}
          # Suppress the CLI's telemetry/error reporting so no egress to non-Anthropic hosts
          # is needed from this token-bearing job.
          CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC: "1"
        run: |
          gh pr diff "$PR_NUMBER" --repo "${{ github.repository }}" > pr.diff
          gh pr view "$PR_NUMBER" --repo "${{ github.repository }}" \
            --json title,body --jq '"# " + .title + "\n\n" + (.body // "")' > pr.md

          # A PR that touches .github/workflows/** is still analysed, but never auto-merged:
          # the merge App is deliberately not granted `workflows` write, so changes to the
          # secret-bearing pipeline always require a human merge.
          if gh pr diff "$PR_NUMBER" --repo "${{ github.repository }}" --name-only \
              | grep -qE '^\.github/workflows/'; then
            echo "touches_workflows=true" >> "$GITHUB_OUTPUT"
          else
            echo "touches_workflows=false" >> "$GITHUB_OUTPUT"
          fi

          PROMPT=$(cat <<'EOF'
          You are reviewing a Dependabot dependency-update pull request for this Maven
          multi-module Java project. The PR title/body is in `pr.md` and the change is in
          `pr.diff`. Use your read-only tools (Read, Grep, Glob) to inspect how the affected
          dependency is used across the codebase.

          Assess whether this update is safe to merge automatically. Flag anything that could
          break the project, specifically:
            - Removed, renamed, or deprecated APIs the project actually calls.
            - Breaking changes across a major version bump.
            - Behavioural changes in transitive dependencies that affect our usage.
            - Changed minimum Java version or other build requirements.

          A patch/minor bump with no impacted usage is normally a PASS. A major bump, or any
          update that touches an API the project uses in a breaking way, is a FAIL.

          Write a short, specific rationale. Then, as the very last line of your response,
          output exactly one of:
          VERDICT: PASS
          VERDICT: FAIL
          EOF
          )

          set +e
          claude -p "$PROMPT" \
            --model claude-sonnet-5 \
            --allowedTools "Read,Grep,Glob" \
            --output-format text | tee analysis.txt
          status=$?
          set -e

          if [ $status -ne 0 ]; then
            echo "Claude CLI exited with status $status; treating as FAIL."
            echo "verdict=FAIL" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          verdict=$(grep -Eio 'VERDICT: (PASS|FAIL)' analysis.txt | tail -n1 | awk '{print $2}')
          if [ -z "$verdict" ]; then
            echo "No verdict found in analysis; treating as FAIL."
            verdict="FAIL"
          fi
          echo "verdict=$verdict" >> "$GITHUB_OUTPUT"

      - name: Post analysis as a PR comment
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ needs.guard.outputs.pr_number }}
          VERDICT: ${{ steps.review.outputs.verdict }}
          TOUCHES_WORKFLOWS: ${{ steps.review.outputs.touches_workflows }}
        run: |
          verdict="${VERDICT:-FAIL}"
          if [ "$verdict" = "PASS" ]; then
            flag="# 🟢 &nbsp; PASS"
          else
            flag="# 🔴 &nbsp; FAIL"
          fi

          {
            echo "$flag"
            echo
            if [ "$verdict" = "PASS" ] && [ "$TOUCHES_WORKFLOWS" = "true" ]; then
              echo "> ⚠️ **Manual merge required.** This PR modifies \`.github/workflows/**\`, so"
              echo "> it is intentionally **not** auto-merged. Review the analysis below and merge"
              echo "> it by hand."
            elif [ "$verdict" = "PASS" ]; then
              echo "> ✅ CI and analysis both passed — this PR will be **auto-merged**."
            else
              echo "> ⛔ This PR will **not** be merged automatically. See the analysis below."
            fi
            echo
            echo "## 🤖 Claude Code dependency analysis"
            echo
            if [ -f analysis.txt ]; then
              cat analysis.txt
            else
              echo "_The analysis did not complete; treated as FAIL._"
            fi
          } > comment.md
          gh pr comment "$PR_NUMBER" --repo "${{ github.repository }}" --body-file comment.md

  # Both gates passed (CI success is the trigger, analysis is PASS) and the PR does not touch
  # .github/workflows/**: merge. Workflow-file PRs are intentionally excluded — merging them
  # needs `workflows` write, which the App is deliberately not granted; they are analysed and
  # flagged for a manual merge instead.
  #
  # The default GITHUB_TOKEN cannot satisfy the "Require review from Code Owners" rule, so we
  # mint a short-lived token for a dedicated GitHub App that is on the branch ruleset's bypass
  # list.
  #
  # The App credentials live ONLY in the `dependabot-merge` environment, whose deployment
  # branch policy allows the default branch (master) exclusively. Because `workflow_run`
  # jobs run in the default-branch context, this job can read them — but any workflow added
  # or altered in a pull request runs from the PR ref and is denied the environment, so it
  # cannot borrow the App token to approve its own PR. The secret, not the workflow logic,
  # is the security boundary.
  merge:
    name: Merge PR
    runs-on: ubuntu-latest
    needs: [guard, analyse]
    permissions:
      contents: read
    if: >
      needs.analyse.outputs.verdict == 'PASS' &&
      needs.analyse.outputs.touches_workflows == 'false'
    environment: dependabot-merge
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2
        with:
          egress-policy: block
          disable-sudo: true
          allowed-endpoints: >
            github.com:443
            api.github.com:443

      - name: Mint GitHub App token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.MERGE_APP_ID }}
          private-key: ${{ secrets.MERGE_APP_PRIVATE_KEY }}

      - name: Squash-merge the Dependabot PR
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_NUMBER: ${{ needs.guard.outputs.pr_number }}
        # The App is a bypass actor on the `master` ruleset, so it may merge past the
        # Code Owner review requirement. `--admin` is required regardless: without it `gh`
        # refuses client-side because the PR's global merge state is BLOCKED
        # (REVIEW_REQUIRED); `--admin` calls the merge endpoint directly, which then honours
        # the App's bypass. No approving review is submitted — an App review does not count
        # toward the Code Owner requirement anyway; the bypass is what authorises the merge.
        run: |
          gh pr merge "$PR_NUMBER" \
            --repo "${{ github.repository }}" \
            --squash \
            --delete-branch \
            --admin
