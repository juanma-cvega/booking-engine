repos:
  # First, and before the slow hooks: this is the last point at which a secret can be kept out of
  # git entirely. Sonar also detects secrets, but only after the push — by then the credential is on
  # the remote and the remedy is rotation, not prevention.
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks

  # Lint GitHub Actions workflows: catches invalid `if:` expressions, bad `uses:` refs, shellcheck
  # findings in `run:` blocks, and context-typo errors that only surface at runtime otherwise.
  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.12
    hooks:
      - id: actionlint

  - repo: local
    hooks:
      - id: spotless-check
        name: Spotless format check
        description: Verify code formatting (Google Java Format via Spotless)
        entry: mvn spotless:check
        language: system
        pass_filenames: false
        types: [java]

      - id: maven-test
        name: Maven test suite
        description: Run the full Maven test suite
        entry: mvn test
        language: system
        pass_filenames: false
        types: [java]

      - id: update-context-md
        name: Update context.md with commit info
        description: Appends the latest commit's info to docs/context.md
        entry: scripts/update-context-md.sh
        language: script
        pass_filenames: false
        always_run: true
        stages: [post-commit]
